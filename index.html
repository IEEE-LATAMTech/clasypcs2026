<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLASP&amp;CS 2026 – Próximamente</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #003087 0%, #0066cc 60%, #00aaff 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #ffffff;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 680px;
    }

    .logo {
      margin-bottom: 2rem;
    }

    .logo img {
      height: 80px;
      filter: brightness(0) invert(1);
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    h1 span {
      display: block;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 400;
      opacity: 0.85;
      margin-top: 0.3rem;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 2px;
      margin: 1.5rem auto;
    }

    .message {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .sub-message {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      opacity: 0.8;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.4rem 1rem;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 2rem;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="240" height="60" viewBox="0 0 240 60" aria-hidden="true" focusable="false">
        <text x="50%" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="white">IEEE</text>
        <text x="50%" y="54" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="400" fill="white" opacity="0.85">LATAMTech</text>
      </svg>
    </div>

    <h1>
      CLASP&amp;CS 2026
      <span>Latin American Symposium on<br>Programming and Computer Science</span>
    </h1>

    <div class="divider"></div>

    <p class="message">🚧 Próximamente más información 🚧</p>
    <p class="sub-message">
      Estamos preparando el sitio oficial del congreso.<br>
      ¡Vuelve pronto para conocer todos los detalles!
    </p>

    <div class="badge">clasypcs2026.ieee-latamtech.org</div>
  </div>
</body>
</html>
